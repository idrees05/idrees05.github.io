<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — KCH Knowledge Base</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">KB</div>
    <h1 class="login-heading">KCH Knowledge Base</h1>
    <p class="login-sub">Sign in to manage knowledge contributions</p>

    {% if error %}
    <div class="alert alert-error" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group">
        <label for="username" class="field-label">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          class="field-input"
          placeholder="Enter username"
          autocomplete="username"
          autofocus
          required
        >
      </div>
      <div class="form-group">
        <label for="password" class="field-label">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="field-input"
          placeholder="Enter password"
          autocomplete="current-password"
          required
        >
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Sign in</button>
    </form>
  </div>
</body>
</html>
